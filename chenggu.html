// ============ 工具函数 ============
function weightToNum(w) {
  const m = w.match(/(?:(\d+)两)?(?:(\d+)钱)?/);
  const liang = m[1] ? parseInt(m[1]) : 0;
  const qian = m[2] ? parseInt(m[2]) : 0;
  return liang + qian / 10;
}

function numToWeight(n) {
  const liang = Math.floor(n);
  const qian = Math.round((n - liang) * 10);
  const parts = [];
  if (liang > 0) parts.push(liang + "两");
  if (qian > 0) parts.push(qian + "钱");
  return parts.join("");
}

  const ganOrder = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
  const entries = [];
  for (const [gz, obj] of Object.entries(yearData)) {
    for (const y of obj.years) {
      const zodiac = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"][zhiOrder.indexOf(gz[1])];
      entries.push({ gz, year: y, zodiac, weight: obj.weight });
    }
  }
  entries.sort((a,b) => a.year - b.year);
  for (const e of entries) {
    const opt = document.createElement("option");
    opt.value = JSON.stringify({ weight: e.weight, gz: e.gz });
    opt.textContent = `${e.year}年 · ${e.gz}${e.zodiac}年`;
    yearSelect.appendChild(opt);
  }

  // 月份

  const monthSelect = document.getElementById("month");
  monthData.forEach((w, i) => {
    const opt = document.createElement("option");
    opt.value = w;
    opt.textContent = `${monthNames[i]}（${w}）`;
    monthSelect.appendChild(opt);
  });

  // 日期

  const dayNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
    "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
    "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
  dayData.forEach((w, i) => {
    const opt = document.createElement("option");
    opt.value = w;
    opt.textContent = `${dayNames[i]}（${w}）`;
    daySelect.appendChild(opt);
  });

  // 时辰
  const hourSelect = document.getElementById("hour");
  hourData.forEach((w, i) => {
    const opt = document.createElement("option");
    opt.value = w;
    opt.textContent = `${hourLabels[i]}（${w}）`;
    hourSelect.appendChild(opt);
  });
}

// ============ 计算 ============
function calculate() {
  const yearVal = JSON.parse(document.getElementById("year").value);
  const monthVal = document.getElementById("month").value;
  const dayVal = document.getElementById("day").value;
  const hourVal = document.getElementById("hour").value;

  const yNum = weightToNum(yearVal.weight);
  const mNum = weightToNum(monthVal);
  const dNum = weightToNum(dayVal);
  const hNum = weightToNum(hourVal);
  const total = yNum + mNum + dNum + hNum;

  const totalStr = numToWeight(total);
  const totalKey = total.toFixed(1);
  const verse = verseData[totalKey] || "暂无对应歌诀，骨重超出常见范围。";

  document.getElementById("totalWeight").textContent = totalStr;
  document.getElementById("detailBreakdown").textContent =
    `年${yearVal.weight}（${yearVal.gz}） + 月${monthVal} + 日${dayVal} + 时${hourVal}`;
  document.getElementById("verseText").textContent = verse;
  document.getElementById("result").classList.add("show");
  document.getElementById("result").scrollIntoView({ behavior: "smooth" });
}

// ============ 启动 ============
